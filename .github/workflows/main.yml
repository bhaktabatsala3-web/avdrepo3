name: etl workflow

on:
    push:
        branches:
        - main

jobs:
    extract_data_job:
        runs-on: ubuntu-latest
        steps:
        - name: checkout code
          uses: action/checkout@v2
        - name: extract_data exicuted
          run: python extract_data.py
    transform_data_job:
        runs-on: ubuntu-latest
        needs: extract_data_job
        steps:
        - name: checkout code
          uses: action/checkout@v2
        - name: transform_data exicuted
          run: python transform_data.py
    load_data_job:
        runs-on: ubuntu-latest
        needs: transform_data_job
        steps:
        - name: checkout code
          uses: action/checkout@v2
        - name: load_data exicuted  
          run: python transform_data.py
